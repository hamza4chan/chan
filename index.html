<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://grossepute.org/">
  <title>grossepute.org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./hoa-analytics.js"></script>
  <style>
    :root {
      --bg: #000;
      --panel: #0a0a0a;
      --line: #1a1a1a;
      --text: #c8c8c8;
      --dim: #555;
      --accent: #fff;
      --ip-dot: #666;
      --gps-dot: #ff3b3b;
      --bar-h: 48px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      overflow: hidden;
    }

    /* ——— carte monde ——— */
    #map-wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding-top: var(--bar-h);
    }

    #map-wrap svg {
      width: min(96vw, 1400px);
      height: auto;
      opacity: .9;
    }

    .land {
      fill: #080808;
      stroke: #161616;
      stroke-width: .4;
    }

    .marker {
      pointer-events: none;
    }

    .marker.ip { fill: var(--ip-dot); }
    .marker.gps { fill: var(--gps-dot); }

    /* ——— barre dashboard ——— */
    #bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: var(--bar-h);
      background: rgba(0,0,0,.92);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      backdrop-filter: blur(8px);
    }

  #brand {
      color: var(--dim);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .auth-form {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .auth-form input {
      background: #111;
      border: 1px solid var(--line);
      color: var(--accent);
      padding: 6px 10px;
      font: inherit;
      width: 120px;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #444;
    }

    .btn {
      background: #111;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 6px 12px;
      font: inherit;
      cursor: pointer;
    }

    .btn:hover { border-color: #444; color: #fff; }
    .btn:disabled { opacity: .4; cursor: wait; }

    .session {
      display: none;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .session.on { display: flex; }

    .session .who { color: var(--dim); }
    .session .who b { color: #fff; }

    .stats {
      color: var(--dim);
      font-size: 10px;
    }

    /* ——— panneau logs ——— */
    #panel {
      display: none;
      position: fixed;
      top: var(--bar-h);
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
      background: rgba(0,0,0,.88);
      overflow: auto;
      padding: 12px 14px 24px;
    }

    #panel.on { display: block; }

    .tbl-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #0e0e0e;
      color: var(--dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 9px;
    }

    tr:hover td { background: #111; }

    .tag {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--line);
      font-size: 9px;
      white-space: nowrap;
    }

    .tag.mobile { border-color: #4a3030; color: #ff8a8a; }
    .tag.box { border-color: #2a3a2a; color: #8aff8a; }
    .tag.unk { color: var(--dim); }

    .err {
      color: #ff6b6b;
      padding: 12px;
      border: 1px solid #3a1a1a;
      margin-bottom: 10px;
    }

    .ua {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--dim);
    }

    .detail {
      color: var(--dim);
      font-size: 10px;
      line-height: 1.5;
      max-width: 220px;
    }

    /* ——— bannière géoloc (style Google) ——— */
    #geo-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 10px 16px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #bbb;
    }

    #geo-banner.show { display: flex; }

    #geo-banner .loc {
      color: #fff;
      font-weight: 600;
    }

    #geo-banner a {
      color: #8ab4f8;
      cursor: pointer;
      text-decoration: none;
    }

    #geo-banner a:hover { text-decoration: underline; }

    @media (max-width: 720px) {
      .auth-form input { width: 90px; }
      th, td { padding: 6px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <header id="bar">
    <div id="brand">● live</div>

    <form id="auth" class="auth-form">
      <input name="pseudo" placeholder="pseudo" autocomplete="username" required>
      <input name="password" type="password" placeholder="password" autocomplete="current-password" required>
      <button type="submit" class="btn">login</button>
    </form>

    <div id="session" class="session">
      <span class="who"><b id="who">—</b></span>
      <span class="stats" id="stats">—</span>
      <button type="button" class="btn" id="btn-toggle">visiteurs</button>
      <button type="button" class="btn" id="btn-refresh">↻</button>
      <button type="button" class="btn" id="btn-out">logout</button>
    </div>
  </header>

  <div id="map-wrap">
    <svg id="world" viewBox="0 0 1000 507" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="1000" height="507" fill="#000"/>
      <g fill="#060606" stroke="#141414" stroke-width=".35" id="continents">
        <path d="M158,92c22-18,48-22,72-12,28-14,58-18,86-8,32-12,66-16,98-6,30-12,64-16,94-6,28-12,60-14,90-4,24-8,48-4,68,8,18,10,32,26,38,46,6,18,4,38-4,56-10,20-28,36-50,44-24,8-52,8-78,2-26-6-50-18-74-28-24-10-48-18-72-22-24-4-48-4-72-2-24,2-48,4-70,0-22-4-42-14-56-28-12-12-20-28-24-44-4-16-2-32,4-46,6-14,16-26,28-34z"/>
        <path d="M95,210c-14,18-22,42-20,66,2,24,14,46,34,60,20,14,46,18,70,12,24-6,44-22,54-44,10-22,10-48,0-70-10-22-30-40-54-48-24-8-52-6-74,4-14,6-26,14-34,24z"/>
        <path d="M248,282c-8,18-4,40,10,54,14,14,36,20,56,16,20-4,36-18,42-38,6-20,0-42-16-56-16-14-40-16-60-8-12,4-22,14-28,26z"/>
        <path d="M448,245c-14,22-18,48-10,72,8,24,26,44,50,54,24,10,52,10,76,0,24-10,42-30,50-54,8-24,4-50-10-70-14-20-38-34-64-38-26-4-52,4-72,22-8,6-14,12-18,16z"/>
        <path d="M538,192c14-18,36-28,58-26,22,2,42,16,52,36,10,20,10,44,0,64-10,20-30,34-52,38-22,4-46-4-62-22-16-18-20-44-14-66,4-12,10-18,18-24z"/>
        <path d="M672,188c16-14,38-20,58-14,20,6,36,24,42,44,6,20,2,42-10,58-12,16-32,26-52,26-20,0-40-10-50-28-10-18-10-40-2-58,6-12,14-20,24-28z"/>
        <path d="M772,242c-10,22-4,48,12,64,16,16,42,24,66,20,24-4,44-20,52-42,8-22,4-46-10-64-14-18-38-28-62-26-24,2-46,16-56,38-2,4-0,6,2,10z"/>
        <path d="M112,352c-18,22-26,52-20,80,6,28,24,52,50,64,26,12,56,12,82,0,26-12,46-36,54-64,8-28,2-58-16-80-18-22-46-36-74-36-28,0-54,14-70,36-2,0-4,0-6,0z"/>
        <path d="M188,392c-8,18-4,38,10,50,14,12,34,16,52,10,18-6,32-22,36-40,4-18-4-36-20-46-16-10-38-10-56-2-10,4-18,12-22,20z"/>

        <path d="M512,392c-12,22-4,48,16,64,20,16,48,18,70,6,22-12,34-36,32-62-2-26-24-48-52-54-28-6-56,6-70,30-2,4,4,10,4,16z"/>
        <path d="M708,352c-14,24-8,54,10,74,18,20,48,26,74,18,26-8,46-30,50-56,4-26-10-52-34-66-24-14-56-10-78,8-12,10-18,16-22,22z"/>
        <path d="M838,392c-10,18-4,38,10,50,14,12,36,14,52,4,16-10,24-30,18-48-6-18-24-32-44-34-20-2-40,8-48,24-2,2,8,6,12,4z"/>
        <path d="M862,118c18-8,38-6,52,8,14,14,18,36,10,54-8,18-26,32-46,36-20,4-42-4-54-22-12-18-10-42,2-60,8-10,20-14,36-16z"/>
        <path d="M902,145c8-6,18-8,28-4,10,4,16,14,16,24,0,10-6,20-16,24-10,4-22,2-30-6-8-8-10-20-4-30,4-6,8-6,12-8z"/>
      </g>
      <g id="markers"></g>
    </svg>
  </div>

  <div id="panel">
    <div id="panel-err" class="err" hidden></div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>date</th>
            <th>ip</th>
            <th>type</th>
            <th>fai / org</th>
            <th>lieu ip</th>
            <th>gps</th>
            <th>user agent</th>
            <th>appareil</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <div id="geo-banner">
    <span id="geo-text"></span>
    <span>—</span>
    <a id="geo-allow">Partager ma position précise</a>
  </div>

  <script>
    const DOMAIN = '@hoa.local';

    function pseudoToEmail(p) {
      return p.trim().toLowerCase().replace(/[^a-z0-9._-]/g, '') + DOMAIN;
    }

    function getSb() {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY || !window.supabase) return null;
      return window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }

    const sb = getSb();
    const authForm = document.getElementById('auth');
    const sessionEl = document.getElementById('session');
    const panel = document.getElementById('panel');
    const rowsEl = document.getElementById('rows');
    const panelErr = document.getElementById('panel-err');
    const markersEl = document.getElementById('markers');
    const geoBanner = document.getElementById('geo-banner');
    const geoText = document.getElementById('geo-text');
    const geoAllow = document.getElementById('geo-allow');

    let panelOpen = false;
    let geoFinish = null;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function connTag(guess) {
      const g = (guess || '').toLowerCase();
      if (g.includes('4g') || g.includes('mobile')) return '<span class="tag mobile">' + esc(guess) + '</span>';
      if (g.includes('box') || g.includes('fixe')) return '<span class="tag box">' + esc(guess) + '</span>';
      return '<span class="tag unk">' + esc(guess || '?') + '</span>';
    }

    function deviceSummary(d) {
      if (!d || typeof d !== 'object') return '—';
      const parts = [
        d.platform,
        d.screen,
        d.language,
        d.timezone,
        d.connection_type && ('net:' + d.connection_type),
        d.effective_type,
        d.mobile_ua ? 'mobile UA' : 'desktop UA',
      ].filter(Boolean);
      return parts.join(' · ');
    }

    function project(lat, lng) {
      const x = ((lng + 180) / 360) * 1000;
      const y = ((90 - lat) / 180) * 507;
      return { x, y };
    }

    function renderMarkers(rows) {
      markersEl.innerHTML = '';
      rows.forEach((r) => {
        if (r.geo_lat != null && r.geo_lng != null) {
          const p = project(r.geo_lat, r.geo_lng);
          markersEl.innerHTML += '<circle class="marker gps" cx="' + p.x + '" cy="' + p.y + '" r="3"><title>GPS ' + esc(r.ip) + '</title></circle>';
        } else if (r.latitude != null && r.longitude != null) {
          const p = project(r.latitude, r.longitude);
          markersEl.innerHTML += '<circle class="marker ip" cx="' + p.x + '" cy="' + p.y + '" r="2"><title>IP ' + esc(r.ip) + '</title></circle>';
        }
      });
    }

    function renderRows(rows) {
      rowsEl.innerHTML = rows.map((r) => {
        const loc = [r.city, r.region, r.country].filter(Boolean).join(', ') || '—';
        const gps = r.geo_lat != null
          ? r.geo_lat.toFixed(5) + ', ' + r.geo_lng.toFixed(5) + ' (±' + Math.round(r.geo_accuracy || 0) + 'm)'
          : (r.geo_status === 'denied' ? 'refusé' : r.geo_status === 'timeout' ? 'timeout' : '—');
        const fai = [r.isp, r.org].filter(Boolean).join(' / ') || '—';
        return '<tr>' +
          '<td>' + fmtDate(r.created_at) + '</td>' +
          '<td>' + esc(r.ip) + '</td>' +
          '<td>' + connTag(r.connection_guess) + '</td>' +
          '<td class="detail">' + esc(fai) + (r.asn ? '<br>AS' + esc(r.asn) : '') + '</td>' +
          '<td>' + esc(loc) + '</td>' +
          '<td class="detail">' + esc(gps) + '</td>' +
          '<td class="ua" title="' + esc(r.user_agent) + '">' + esc(r.user_agent) + '</td>' +
          '<td class="detail">' + esc(deviceSummary(r.device)) + '</td>' +
          '</tr>';
      }).join('');
      renderMarkers(rows);
      const uniq = new Set(rows.map(r => r.ip)).size;
      document.getElementById('stats').textContent = rows.length + ' visites · ' + uniq + ' IP';
    }

    async function loadVisitors() {
      panelErr.hidden = true;
      const { rows, error } = await window.HOA_ANALYTICS.loadVisitors();
      if (error) {
        panelErr.textContent = error;
        panelErr.hidden = false;
        rowsEl.innerHTML = '';
        return;
      }
      renderRows(rows);
    }

    function displayName(user) {
      return user?.user_metadata?.username || user?.email?.replace(DOMAIN, '') || 'admin';
    }

    function enterSession(user) {
      authForm.style.display = 'none';
      sessionEl.classList.add('on');
      document.getElementById('who').textContent = displayName(user);
      loadVisitors();
    }

    function leaveSession() {
      authForm.style.display = 'flex';
      sessionEl.classList.remove('on');
      panel.classList.remove('on');
      panelOpen = false;
      markersEl.innerHTML = '';
      rowsEl.innerHTML = '';
    }

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!sb) return alert('Supabase non configuré');
      const btn = authForm.querySelector('.btn');
      btn.disabled = true;
      const { error } = await sb.auth.signInWithPassword({
        email: pseudoToEmail(authForm.pseudo.value),
        password: authForm.password.value,
      });
      btn.disabled = false;
      if (error) alert(error.message === 'Invalid login credentials' ? 'Identifiants invalides' : error.message);
    });

    document.getElementById('btn-out').addEventListener('click', () => sb?.auth.signOut());
    document.getElementById('btn-refresh').addEventListener('click', () => loadVisitors());
    document.getElementById('btn-toggle').addEventListener('click', () => {
      panelOpen = !panelOpen;
      panel.classList.toggle('on', panelOpen);
      if (panelOpen) loadVisitors();
    });

    geoAllow.addEventListener('click', (e) => {
      e.preventDefault();
      if (!geoFinish) return;
      geoBanner.classList.remove('show');
      window.HOA_ANALYTICS.askGeolocation(15000).then((geo) => {
        const fn = geoFinish;
        geoFinish = null;
        fn(geo);
      });
    });

    async function init() {
      if (!sb) return;
      window.HOA_ANALYTICS.setClient(sb);

      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) enterSession(session.user);

      sb.auth.onAuthStateChange((_e, session) => {
        if (session?.user) enterSession(session.user);
        else leaveSession();
      });

      window.HOA_ANALYTICS.trackVisit({
        onIpKnown(ipHint) {
          const loc = [ipHint.city, ipHint.country].filter(Boolean).join(', ') || 'votre région';
          geoText.innerHTML = esc(loc) + ' <span class="loc">— d\'après votre IP</span>';
          geoBanner.classList.add('show');
        },
        requestGeo() {
          return new Promise((resolve) => {
            geoFinish = resolve;
            setTimeout(() => {
              if (!geoFinish) return;
              geoBanner.classList.remove('show');
              const fn = geoFinish;
              geoFinish = null;
              fn({ status: 'timeout' });
            }, 22000);
          });
        },
      });
    }

    init();
  </script>
</body>
</html>
