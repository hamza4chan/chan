<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="description" content="4chan Hamza, Sofiane, Saphir, Since">
  <title>4chan Hamza, Sofiane, Saphir, Since</title>
  <link rel="canonical" href="https://grossepute.org/">
  <meta name="theme-color" content="#000000">
  <meta property="og:site_name" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta property="og:title" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta property="og:description" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta property="og:url" content="https://grossepute.org/">
  <meta property="og:image" content="https://grossepute.org/images/photo-12.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta name="twitter:description" content="4chan Hamza, Sofiane, Saphir, Since">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .scale-wrap {
      transform-origin: center center;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .art-wrap {
      position: relative;
      transform-origin: center center;
      will-change: transform, filter;
      transition:
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        filter 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .art-wrap.distort {
      transform: perspective(900px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) skewX(var(--skew, 0deg)) scale(1.012);
      filter: url(#glitch-distort) brightness(1.15) contrast(1.08);
    }

    .art-wrap .ghost {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .art-wrap.distort .ghost-red {
      opacity: 0.35;
      transform: translate(-2px, 0);
      color: #ff0033;
    }

    .art-wrap.distort .ghost-blue {
      opacity: 0.25;
      transform: translate(2px, 0);
      color: #ff4466;
    }

    pre {
      font-family: "Courier New", Courier, monospace;
      font-size: 3.2px;
      line-height: 1;
      color: #c41e3a;
      white-space: pre;
      user-select: none;
      text-shadow:
        0 0 3px rgba(196, 30, 58, 0.9),
        0 0 8px rgba(196, 30, 58, 0.55),
        0 0 18px rgba(140, 10, 30, 0.35);
      transition:
        color 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        text-shadow 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .art-wrap.distort pre.main {
      color: #ff2040;
      text-shadow:
        0 0 4px rgba(255, 32, 64, 1),
        0 0 12px rgba(255, 32, 64, 0.7),
        0 0 28px rgba(196, 30, 58, 0.45);
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0, 0, 0, 0.7) 100%);
      z-index: 5;
    }

    .scan {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 0, 40, 0.03) 2px,
        rgba(255, 0, 40, 0.03) 4px
      );
      transition: opacity 0.55s ease;
    }

    .scan.on { opacity: 1; }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="glitch-distort" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.018 0.06" numOctaves="2" seed="4" result="noise"/>
        <feDisplacementMap id="disp" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div class="stage" id="stage">
    <div class="scale-wrap" id="scale">
      <div class="art-wrap" id="wrap">
        <pre class="ghost ghost-red" id="ghost-r" aria-hidden="true"></pre>
        <pre class="ghost ghost-blue" id="ghost-b" aria-hidden="true"></pre>
        <pre class="main" id="art"></pre>
      </div>
    </div>
  </div>

  <div class="scan" id="scan"></div>
  <div class="vignette"></div>

  <script>
    const scale = document.getElementById('scale');
    const wrap = document.getElementById('wrap');
    const art = document.getElementById('art');
    const ghostR = document.getElementById('ghost-r');
    const ghostB = document.getElementById('ghost-b');
    const scan = document.getElementById('scan');
    const disp = document.getElementById('disp');
    const turb = document.getElementById('turb');

    let distorting = false;
    let dispScale = 0;
    let dispTarget = 0;
    let rafId = null;

    function fitArt() {
      const s = Math.max(Math.min(
        (window.innerWidth * 0.96) / art.scrollWidth,
        (window.innerHeight * 0.96) / art.scrollHeight
      ), 0.5);
      scale.style.transform = `scale(${s})`;
    }

    function lerpDisp() {
      dispScale += (dispTarget - dispScale) * 0.14;
      if (Math.abs(dispTarget - dispScale) < 0.05) dispScale = dispTarget;
      disp.setAttribute('scale', dispScale.toFixed(2));
      if (distorting) {
        turb.setAttribute('baseFrequency', `0.0${(18 + Math.sin(Date.now() * 0.008) * 6).toFixed(0)} 0.0${(55 + Math.cos(Date.now() * 0.006) * 15).toFixed(0)}`);
      }
      if (dispScale !== dispTarget || distorting) {
        rafId = requestAnimationFrame(lerpDisp);
      } else {
        rafId = null;
      }
    }

    function setDistort(on, e) {
      distorting = on;
      dispTarget = on ? 22 : 0;
      wrap.classList.toggle('distort', on);
      scan.classList.toggle('on', on);

      if (on && e) {
        const rect = wrap.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / rect.width;
        const dy = (e.clientY - cy) / rect.height;
        wrap.style.setProperty('--rx', `${dy * -6}deg`);
        wrap.style.setProperty('--ry', `${dx * 6}deg`);
        wrap.style.setProperty('--skew', `${dx * 3}deg`);
      } else {
        wrap.style.setProperty('--rx', '0deg');
        wrap.style.setProperty('--ry', '0deg');
        wrap.style.setProperty('--skew', '0deg');
      }

      if (!rafId) rafId = requestAnimationFrame(lerpDisp);
    }

    wrap.addEventListener('mouseenter', e => setDistort(true, e));
    wrap.addEventListener('mousemove', e => {
      if (!distorting) return;
      const rect = wrap.getBoundingClientRect();
      const dx = (e.clientX - (rect.left + rect.width / 2)) / rect.width;
      const dy = (e.clientY - (rect.top + rect.height / 2)) / rect.height;
      wrap.style.setProperty('--rx', `${dy * -6}deg`);
      wrap.style.setProperty('--ry', `${dx * 6}deg`);
      wrap.style.setProperty('--skew', `${dx * 3}deg`);
    });
    wrap.addEventListener('mouseleave', () => setDistort(false));

    fetch('./ascii-art.txt')
      .then(r => r.text())
      .then(text => {
        art.textContent = text;
        ghostR.textContent = text;
        ghostB.textContent = text;
        fitArt();
      });

    window.addEventListener('resize', fitArt);
  </script>
</body>
</html>
