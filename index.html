<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="description" content="4chan Hamza, Sofiane, Saphir, Since">
  <title>4chan Hamza, Sofiane, Saphir, Since</title>
  <link rel="canonical" href="https://grossepute.org/">
  <meta name="theme-color" content="#1a0000">
  <meta property="og:url" content="https://grossepute.org/">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;color:#8b0018}
    body{font-family:"Share Tech Mono",monospace}

    .pulse{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,rgba(120,0,20,.12) 0%,transparent 55%);animation:breathe 4.5s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.35}50%{opacity:.85}}

    .spotlight{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle 180px at var(--mx,50%) var(--my,50%),rgba(180,10,30,.07),transparent 70%);transition:background .08s linear}

    #grain{position:fixed;inset:0;width:100%;height:100%;opacity:.07;pointer-events:none;image-rendering:pixelated}

    .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
    .scale{transform-origin:center;transition:transform .15s ease-out;will-change:transform}
    #art{
      font-size:3.6px;line-height:1;color:#b01028;white-space:pre;user-select:none;
      text-shadow:0 0 4px rgba(180,15,35,.85),0 0 12px rgba(120,0,20,.45);
      animation:flicker 6s infinite;
    }
    @keyframes flicker{
      0%,100%{opacity:1}92%{opacity:1}93%{opacity:.55}94%{opacity:1}96%{opacity:.7}97%{opacity:1}
    }

    .scanlines{position:fixed;inset:0;pointer-events:none;z-index:4;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.22) 2px,rgba(0,0,0,.22) 4px);opacity:.45}
    .vignette{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.88) 100%)}

    .flash{position:fixed;inset:0;background:rgba(120,0,15,.18);pointer-events:none;opacity:0;z-index:6;transition:opacity .05s}
    .flash.on{opacity:1}

    .whisper{position:fixed;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(200,20,40,.0);pointer-events:none;z-index:7;transition:opacity 2s ease,text-shadow 2s ease;white-space:nowrap}
    .whisper.show{color:rgba(200,20,40,.55);text-shadow:0 0 8px rgba(200,20,40,.6)}

    .hud{position:fixed;bottom:0;left:0;right:0;z-index:8;padding:12px 16px;font-size:11px;color:rgba(180,20,35,.65);letter-spacing:.08em;border-top:1px solid rgba(120,0,20,.25);background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;justify-content:space-between;gap:1rem}
    .hud .blink{animation:blink 1s step-end infinite;color:#cc1028}
    @keyframes blink{50%{opacity:0}}
    .hud .sig{color:rgba(120,0,20,.5);font-size:9px}

    .glitch-line{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(200,20,40,.5);box-shadow:0 0 12px rgba(200,20,40,.8);pointer-events:none;z-index:9;opacity:0}
    .glitch-line.on{animation:glitchSlice .12s ease-out forwards}
    @keyframes glitchSlice{0%{opacity:0;transform:translateY(0)}20%{opacity:1}100%{opacity:0;transform:translateY(8px)}}
  </style>
</head>
<body>

  <div class="spotlight" id="spot"></div>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="flash" id="flash"></div>
  <div class="glitch-line" id="gline"></div>
  <div id="whispers"></div>
  <div class="hud">
    <div><span id="term"></span><span class="blink">_</span></div>

  // grain
  const gc = document.getElementById("grain");
  const gx = gc.getContext("2d");
  function resizeGrain() {
    gc.width = Math.ceil(innerWidth / 4);
    gc.height = Math.ceil(innerHeight / 4);
  }
  function drawGrain() {
    const w = gc.width, h = gc.height;
    const img = gx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 80 | 0;
      d[i] = 120; d[i+1] = v >> 2; d[i+2] = v >> 3; d[i+3] = 30 + Math.random() * 40;
    }
    gx.putImageData(img, 0, 0);
    requestAnimationFrame(drawGrain);
  }

  function whisper() {
    const el = document.createElement("div");
    el.className = "whisper";
    el.textContent = WHISPERS[Math.random() * WHISPERS.length | 0];
    el.style.left = (8 + Math.random() * 75) + "%";
    el.style.top = (10 + Math.random() * 70) + "%";
    whispersEl.appendChild(el);
    requestAnimationFrame(() => el.classList.add("show"));
    setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 2000); }, 1800 + Math.random() * 2000);
    setTimeout(whisper, 4000 + Math.random() * 7000);
  }

  function glitch() {
    if (Math.random() < .35) {
      gline.style.top = (Math.random() * 100) + "%";
      gline.classList.add("on");
      setTimeout(() => gline.classList.remove("on"), 120);
    }
    if (Math.random() < .12) {
      flash.classList.add("on");
      setTimeout(() => flash.classList.remove("on"), 50 + Math.random() * 80);
    }
    if (Math.random() < .08) {
      art.style.transform = "translate(" + ((Math.random()-.5)*3) + "px," + ((Math.random()-.5)*2) + "px)";
      setTimeout(() => art.style.transform = "", 60);
    }
    setTimeout(glitch, 800 + Math.random() * 2500);
  }

  let ti = 0;
  setInterval(() => {
    term.textContent = TERMS[ti++ % TERMS.length];
    sig.textContent = "SIG: " + Math.random().toString(16).slice(2,6).toUpperCase() + "." + (Math.random()*999|0) + " // " + MSGS[Math.random()*MSGS.length|0].toUpperCase();
  }, 3200);

  fit();
  resizeGrain();
  drawGrain();
  whisper();
  glitch();
  addEventListener("resize", () => { fit(); resizeGrain(); });
})();
  </script>
</body>
</html>
