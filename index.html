<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grossepute.org</title>
  <link rel="canonical" href="https://grossepute.org/">
  <meta name="theme-color" content="crimson">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: crimson;
      overflow: hidden;
    }
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 35%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }
  </style>
</head>
<body>
  <div class="vignette" aria-hidden="true"></div>
</body>
</html>
