<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="description" content="4chan Hamza, Sofiane, Saphir, Since">
  <title>4chan Hamza, Sofiane, Saphir, Since</title>
  <link rel="canonical" href="https://grossepute.org/victimes/">
  <meta name="theme-color" content="#000000">
  <meta property="og:site_name" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta property="og:title" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta property="og:description" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta property="og:url" content="https://grossepute.org/victimes/">
  <meta property="og:image" content="https://grossepute.org/images/photo-12.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="4chan Hamza, Sofiane, Saphir, Since">
  <meta name="twitter:description" content="4chan Hamza, Sofiane, Saphir, Since">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
    }

    #blood-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000000;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.85) 100%);
    }
  </style>
</head>
<body>
  <canvas id="blood-canvas"></canvas>
  <div class="vignette"></div>

  <script>
    const canvas = document.getElementById('blood-canvas');
    const ctx = canvas.getContext('2d');

    const FONT = '13px "Share Tech Mono", "Courier New", monospace';
    const CELL = 14;
    const COLORS = ['#3d0008', '#5c0010', '#8b0018', '#b01025', '#c41e3a', '#e02040'];

    const PATTERNS = [
      ` .
       |
       |
       |
       :`,
      `\\
        \\
         \\
          |`,
      `  *#
       #*%
        ##`,
      `|\\
        |\\
         |`,
      ` . .
        :::
         |`,
      `  /
       /
      /
     |`,
      `*#
      ##*
       #`,
      `  |
       |
      / \\
       |`,
      ` . .
      ::::
       ||`,
      `\\
       #
        #
         |`,
      `%*%
       ###
        #`,
      `  :
   :::::
    |||`,
      `| |
 | |
  |`,
      `\\
  ##
   ||
    |`,
    ];

    function parsePattern(str) {
      const cells = [];
      str.split('\n').forEach((line, y) => {
        [...line].forEach((ch, x) => {
          if (ch !== ' ') cells.push({ x, y, ch });
        });
      });
      return cells;
    }

    const PARSED = PATTERNS.map(parsePattern);
    let traces = [];
    let w, h, cols, rows;
    let lastSpawn = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(w / CELL);
      rows = Math.ceil(h / CELL);
    }

    function spawnTrace() {
      const pattern = PARSED[Math.floor(Math.random() * PARSED.length)];
      const maxX = cols - 8;
      const maxY = rows - 10;
      if (maxX < 1 || maxY < 1) return;

      traces.push({
        pattern,
        gx: Math.floor(Math.random() * maxX) + 2,
        gy: Math.floor(Math.random() * maxY) + 2,
        born: performance.now(),
        life: 3500 + Math.random() * 5500,
        fadeIn: 600 + Math.random() * 1000,
        fadeOut: 1000 + Math.random() * 1500,
        drift: (Math.random() - 0.5) * 0.2,
        flicker: Math.random() * Math.PI * 2,
        colorOffset: Math.floor(Math.random() * COLORS.length),
      });
    }

    function traceOpacity(trace, now) {
      const age = now - trace.born;
      if (age < 0 || age > trace.life) return 0;
      if (age < trace.fadeIn) return age / trace.fadeIn;
      if (age > trace.life - trace.fadeOut) return (trace.life - age) / trace.fadeOut;
      return 1;
    }

    function drawTrace(trace, now) {
      const alpha = traceOpacity(trace, now);
      if (alpha <= 0) return;

      const driftY = (now - trace.born) * 0.006 * trace.drift;
      const flicker = 0.8 + 0.2 * Math.sin(now * 0.003 + trace.flicker);

      trace.pattern.forEach((cell, i) => {
        const color = COLORS[(trace.colorOffset + Math.floor(i / 2)) % COLORS.length];
        const charAlpha = alpha * flicker * (0.55 + (i / trace.pattern.length) * 0.45);

        ctx.globalAlpha = charAlpha;
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = charAlpha > 0.4 ? 6 : 2;
        ctx.fillText(cell.ch, (trace.gx + cell.x) * CELL, (trace.gy + cell.y) * CELL + driftY);
      });

      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    function drawDrips(now) {
      const count = Math.floor(cols * rows * 0.0006);
      for (let i = 0; i < count; i++) {
        const seed = (now * 0.001 + i * 137.5) % 10000;
        const x = (seed * 7.3) % w;
        const phase = (seed * 3.1) % (Math.PI * 2);
        const alpha = 0.06 + 0.1 * Math.sin(now * 0.002 + phase);
        if (alpha < 0.04) continue;

        const y = ((now * 0.035 + seed * 13) % (h + 200)) - 100;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = COLORS[2 + (i % 3)];
        ctx.shadowColor = '#8b0018';
        ctx.shadowBlur = 4;
        ctx.fillText('|', x, y);
        ctx.fillText(':', x, y + CELL);
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    function loop(now) {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, w, h);
      ctx.font = FONT;
      ctx.textBaseline = 'top';

      drawDrips(now);

      traces = traces.filter(t => now - t.born < t.life);
      traces.forEach(t => drawTrace(t, now));

      if (now - lastSpawn > 500 + Math.random() * 900) {
        spawnTrace();
        if (Math.random() < 0.4) spawnTrace();
        lastSpawn = now;
      }

      if (traces.length < 14) spawnTrace();

      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    for (let i = 0; i < 10; i++) spawnTrace();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
