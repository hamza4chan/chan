  <script>
(() => {
  const ART = JSON.parse(document.getElementById("art-data").textContent);
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });

  const CELL_W = 4.05, CELL_H = 5, RADIUS = 85, PUSH = 9;
  const LERP_IN = 0.2, LERP_OUT = 0.12, BUCKET = 32;

  const chars = [];
  const buckets = new Map();
  const lines = ART.split("\n");
  let maxCol = 0;

  for (let row = 0; row < lines.length; row++) {
    const line = lines[row];
    if (line.length > maxCol) maxCol = line.length;
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      if (ch === " ") continue;
      const bx = col * CELL_W + 2, by = row * CELL_H + 1;
      const c = { bx, by, ch, ox: 0, oy: 0 };
      chars.push(c);
      const key = ((bx / BUCKET) | 0) + "," + ((by / BUCKET) | 0);
      if (!buckets.has(key)) buckets.set(key, []);
      buckets.get(key).push(c);
    }
  }

  const W = Math.ceil(maxCol * CELL_W) + 4;
  const H = Math.ceil(lines.length * CELL_H) + 4;
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.font = "4px Courier New, monospace";
  ctx.textBaseline = "top";

  let scale = 1, mouseOn = false, mx = -9999, my = -9999, anim = false, raf = 0;

  function fit() {
    scale = Math.min(innerWidth * 0.96 / W, innerHeight * 0.96 / H, 3);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  }

  function toCanvas(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / scale, y: (e.clientY - r.top) / scale };
  }

  function nearChars() {
    const list = [];
    const bx0 = ((mx - RADIUS) / BUCKET) | 0, bx1 = ((mx + RADIUS) / BUCKET) | 0;
    const by0 = ((my - RADIUS) / BUCKET) | 0, by1 = ((my + RADIUS) / BUCKET) | 0;
    for (let gy = by0; gy <= by1; gy++)
      for (let gx = bx0; gx <= bx1; gx++) {
        const b = buckets.get(gx + "," + gy);
        if (b) list.push(...b);
      }
    return list;
  }

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#c41e3a";

    const r2 = RADIUS * RADIUS;
    const active = mouseOn ? nearChars() : [];
    const activeSet = new Set(active);

    for (let i = 0; i < chars.length; i++) {
      const c = chars[i];
      let tx = 0, ty = 0;

      if (mouseOn && activeSet.has(c)) {
        const dx = c.bx - mx, dy = c.by - my;
        const d2 = dx * dx + dy * dy;
        if (d2 < r2 && d2 > 0.01) {
          const d = Math.sqrt(d2);
          const f = (1 - d / RADIUS) * PUSH;
          tx = (dx / d) * f;
          ty = (dy / d) * f;
        }
      }

      const k = mouseOn ? LERP_IN : LERP_OUT;
      c.ox += (tx - c.ox) * k;
      c.oy += (ty - c.oy) * k;
      ctx.fillText(c.ch, c.bx + c.ox, c.by + c.oy);
    }
  }

  function moving() {
    if (mouseOn) return true;
    for (let i = 0; i < chars.length; i++) {
      const c = chars[i];
      if (c.ox * c.ox + c.oy * c.oy > 0.5) return true;
    }
    return false;
  }

  function loop() {
    raf = 0;
    draw();
    if (moving()) raf = requestAnimationFrame(loop);
    else anim = false;
  }

  function kick() {
    if (!anim) { anim = true; raf = requestAnimationFrame(loop); }
  }

  canvas.addEventListener("mouseenter", e => { mouseOn = true; const p = toCanvas(e); mx = p.x; my = p.y; kick(); });
  canvas.addEventListener("mousemove", e => { if (!mouseOn) return; const p = toCanvas(e); mx = p.x; my = p.y; kick(); }, { passive: true });
  canvas.addEventListener("mouseleave", () => { mouseOn = false; kick(); });

  fit(); draw();
  addEventListener("resize", () => { fit(); kick(); });
})();
