  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const CELL_W = 5, CELL_H = 7;

    function render(art) {
      const lines = art.split('\n');
      let maxCol = 0;
      for (let i = 0; i < lines.length; i++) if (lines[i].length > maxCol) maxCol = lines[i].length;
      const W = maxCol * CELL_W + 8, H = lines.length * CELL_H + 8;
      const dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.font = CELL_H + 'px monospace';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff1a3a';
      for (let row = 0; row < lines.length; row++) {
        const line = lines[row];
        for (let col = 0; col < line.length; col++) {
          const ch = line[col];
          if (ch !== ' ') ctx.fillText(ch, col * CELL_W + 4, row * CELL_H + 4);
        }
      }
      const s = Math.min(innerWidth * .96 / W, innerHeight * .96 / H);
      canvas.style.width = Math.floor(W * s) + 'px';
      canvas.style.height = Math.floor(H * s) + 'px';
    }

    render(JSON.parse(document.getElementById('art-data').textContent));
    addEventListener('resize', () => render(JSON.parse(document.getElementById('art-data').textContent)));
  </script>
</body>
</html>
