  <script>
    const ART = JSON.parse(document.getElementById('art-data').textContent);
    const scale = document.getElementById('scale');
    const wrap = document.getElementById('wrap');
    const art = document.getElementById('art');
    const ghostR = document.getElementById('ghost-r');
    const ghostB = document.getElementById('ghost-b');
    const scan = document.getElementById('scan');
    const disp = document.getElementById('disp');
    const turb = document.getElementById('turb');
    let distorting = false, dispScale = 0, dispTarget = 0, rafId = null;
    art.textContent = ART; ghostR.textContent = ART; ghostB.textContent = ART;
    function fitArt() {
      const s = Math.max(Math.min((innerWidth * 0.96) / art.scrollWidth, (innerHeight * 0.96) / art.scrollHeight), 0.5);
      scale.style.transform = 'scale(' + s + ')';
    }
    function lerpDisp() {
      dispScale += (dispTarget - dispScale) * 0.14;
      if (Math.abs(dispTarget - dispScale) < 0.05) dispScale = dispTarget;
      disp.setAttribute('scale', dispScale.toFixed(2));
      if (distorting) turb.setAttribute('baseFrequency', '0.0' + (18 + Math.sin(Date.now() * 0.008) * 6).toFixed(0) + ' 0.0' + (55 + Math.cos(Date.now() * 0.006) * 15).toFixed(0));
      if (dispScale !== dispTarget || distorting) rafId = requestAnimationFrame(lerpDisp); else rafId = null;
    }
    function setDistort(on, e) {
      distorting = on; dispTarget = on ? 22 : 0;
      wrap.classList.toggle('distort', on); scan.classList.toggle('on', on);
      if (on && e) {
        const r = wrap.getBoundingClientRect(), dx = (e.clientX - (r.left + r.width / 2)) / r.width, dy = (e.clientY - (r.top + r.height / 2)) / r.height;
        wrap.style.setProperty('--rx', dy * -6 + 'deg'); wrap.style.setProperty('--ry', dx * 6 + 'deg'); wrap.style.setProperty('--skew', dx * 3 + 'deg');
      } else { wrap.style.setProperty('--rx', '0deg'); wrap.style.setProperty('--ry', '0deg'); wrap.style.setProperty('--skew', '0deg'); }
      if (!rafId) rafId = requestAnimationFrame(lerpDisp);
    }
    wrap.addEventListener('mouseenter', e => setDistort(true, e));
    wrap.addEventListener('mousemove', e => {
      if (!distorting) return;
      const r = wrap.getBoundingClientRect(), dx = (e.clientX - (r.left + r.width / 2)) / r.width, dy = (e.clientY - (r.top + r.height / 2)) / r.height;
      wrap.style.setProperty('--rx', dy * -6 + 'deg'); wrap.style.setProperty('--ry', dx * 6 + 'deg'); wrap.style.setProperty('--skew', dx * 3 + 'deg');
    });
    wrap.addEventListener('mouseleave', () => setDistort(false));
    fitArt(); addEventListener('resize', fitArt);
  </script>
